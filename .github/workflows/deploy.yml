name: Deploy Backend Ventas (8092)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          # AJUSTADO: Ahora apunta a la carpeta exacta de la captura
          context: ./Springboot-API-REST
          push: true
          # Imagen única para Ventas
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-backend-8092:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH Proxy Jump
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BACKEND_PRIVATE_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.FRONTEND_PUBLIC_IP }}
          proxy_username: ${{ secrets.SSH_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/innovatech-deployment
            # Actualizamos solo el servicio de ventas
            docker compose pull backend-8092
            docker compose up -d backend-8092
            docker image prune -f