version: '3.8'

services:
  backend-8092:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-8092-standalone
    ports:
      - "8092:8092"
    environment:
      - DB_ENDPOINT=db-8092
      - DB_PORT=3306
      - DB_NAME=innovatech_db
      - DB_USERNAME=admin
      - DB_PASSWORD=admin_pass
    depends_on:
      - db-8092

  db-8092:
    image: mariadb:10.11
    container_name: db-8092-standalone
    environment:
      - MARIADB_DATABASE=innovatech_db
      - MARIADB_USER=admin
      - MARIADB_PASSWORD=admin_pass
      - MARIADB_ROOT_PASSWORD=root_pass
    volumes:
      - data-8092:/var/lib/mysql

volumes:
  data-8092: